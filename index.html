<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LlamaBarrio - Próximamente</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #ff7a00, #ffb347);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 500px;
      padding: 30px;
    }

    .logo {
      width: 120px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 1.2rem;
      font-weight: normal;
      margin-bottom: 25px;
      opacity: 0.9;
    }

    p {
      font-size: 1rem;
      margin-bottom: 30px;
      opacity: 0.85;
    }

    .loader {
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 25px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .footer {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 20px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
      .logo {
        width: 90px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO -->
    <img src="./logo.png" alt="Logo LlamaBarrio" class="logo">

    <h1>🔥 LlamaBarrio</h1>
    <h2>Estamos creando algo increíble 🚀</h2>

    <div class="loader"></div>

    <p>
      Nuestra web está en construcción.<br>
      Muy pronto podrás descubrir y compartir las mejores picadas de tu barrio.
    </p>

    <p><strong>¡Vuelve pronto!</strong></p>

    <div class="footer">
      © 2026 LlamaBarrio - Todos los derechos reservados
    </div>
  </div>

</body>
</html>
