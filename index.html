<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LlamaBarrio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
    <div class="nav-container">

        <!-- LOGO CENTRADO -->
        <div class="brand">
            <img src="images/logo.png" class="logo-img">
        </div>

        <!-- BUSCADOR -->
        <div class="header-controls-group">

            <div class="oval-control location-wrapper">
                <select id="location-filter" onchange="buscar()">
                    <option value="">Comuna</option>
                </select>
            </div>

            <div class="oval-control search-bar-wrapper">
                <input type="text" id="main-search" placeholder="Buscar" onkeyup="buscar()">
            </div>

        </div>
    </div>
</nav>

<main class="content-wrapper">

    <h1 class="hero-title">Encuentra datos en tu barrio</h1>

    <!-- PICADAS -->
    <section class="section-picadas-container">
        <h2 class="titulo-picadas-morado">🔥 Picadas</h2>
        <div id="cheap-scroll" class="circle-scroll"></div>
    </section>

    <!-- RESULTADOS -->
    <section class="section-resultados">
        <h3 class="tag naranja">🍔 Resultados</h3>
        <div id="product-list" class="results-grid"></div>
    </section>

    <!-- RECOMENDADOS -->
    <section class="section-recomendados">
        <h3 class="tag azul">🌟 Recomendados</h3>
        <div id="comuna-list" class="results-grid"></div>
    </section>

    <!-- BANNER -->
    <section class="promo-banner">
        <img src="images/promocionimagen.png" class="full-promo-img">
    </section>

</main>

<footer class="main-footer">
    <p>LlamaBarrio © 2026</p>
</footer>

<!-- BOTONES -->
<div class="mobile-float-bar">
    <button onclick="abrirFormDato()">Compartir</button>
    <button onclick="abrirFormPromo()">Negocio</button>
</div>

<!-- POPUP -->
<div id="productPopup" class="popup-overlay" style="display:none;">
    <div class="popup-content">
        <button onclick="cerrarPopupProducto()">✕</button>
        <div id="popup-body"></div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
