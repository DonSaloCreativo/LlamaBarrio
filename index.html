<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LlamaBarrio - Tu Guía Local</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo-container">
            <h1>Llama<span>Barrio</span></h1>
        </div>
        <div class="search-container">
            <select id="location-filter" onchange="buscar()">
                <option value="">Todas las comunas</option>
                <option value="San Bernardo">San Bernardo</option>
                <option value="Maipú">Maipú</option>
                <option value="Puente Alto">Puente Alto</option>
                <option value="Santiago">Santiago</option>
            </select>
            <input type="text" id="main-search" placeholder="¿Qué buscas hoy? (ej: pan, pizza, sushi...)" onkeyup="buscar()">
        </div>
    </header>

    <main id="app-container">
        <div id="loading">Cargando locales...</div>
        <div id="grid-negocios" class="grid"></div>
    </main>

    <div id="productPopup" class="popup-overlay" onclick="cerrarPopup(event)">
        <div class="popup-content">
            <span class="close-btn" onclick="document.getElementById('productPopup').style.display='none'">&times;</span>
            <div id="popup-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
