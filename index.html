<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LlamaBarrio - Próximamente</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #ff7a00, #ffb347);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      line-height: 1.5;
    }

    .container {
      max-width: 500px;
      padding: 30px;
    }

    .logo {
      width: 120px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 1.2rem;
      font-weight: normal;
      margin-bottom: 25px;
      opacity: 0.9;
    }

    p {
      font-size: 1rem;
      margin-bottom: 30px;
      opacity: 0.85;
    }

    .loader {
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 25px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .footer {
      font-size: 0.8rem;
      opacity: 0.7;
      margin-top: 20px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
      white-space: nowrap;
    }

    @media (prefers-reduced-motion: reduce) {
      .loader {
        animation: none;
      }
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
      .logo {
        width: 90px;
      }
    }
  </style>
</head>

<body>

  <main class="container" role="main" aria-labelledby="site-title">

    <!-- LOGO -->
    <img src="./logo.png" alt="Logo LlamaBarrio" class="logo" decoding="async">

    <h1 id="site-title">🔥 LlamaBarrio</h1>
    <p class="subtitle">Estamos creando algo increíble 🚀</p>

    <div class="loader" aria-hidden="true"></div>
    <p class="sr-only" role="status">Cargando contenido próximamente.</p>

    <p>
      Nuestra web está en construcción.<br>
      Muy pronto podrás descubrir y compartir las mejores picadas de tu barrio.
    </p>

    <p><strong>¡Vuelve pronto!</strong></p>

    <footer class="footer">
      <small>© 2026 LlamaBarrio - Todos los derechos reservados</small>
    </footer>
  </main>

</body>
</html>
