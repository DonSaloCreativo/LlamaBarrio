<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LlamaBarrio | Tu Guía de Barrio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo-container">
            <h1>Llama<span>Barrio</span></h1>
        </div>
        <div class="search-area">
            <select id="location-filter" onchange="buscar()">
                <option value="">Todas las comunas</option>
                <option value="San Bernardo">San Bernardo</option>
                <option value="Maipú">Maipú</option>
                <option value="Puente Alto">Puente Alto</option>
                <option value="Santiago">Santiago</option>
            </select>
            <input type="text" id="main-search" placeholder="Buscar pan, sushi, botillería..." onkeyup="buscar()">
        </div>
    </header>

    <main>
        <div id="loading" class="status-msg">Cargando locales...</div>
        <div id="grid-negocios" class="grid-container"></div>
    </main>

    <div id="productPopup" class="modal-overlay" onclick="cerrarModal(event)">
        <div class="modal-content">
            <span class="close-modal" onclick="cerrarPopupBtn()">&times;</span>
            <div id="popup-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
