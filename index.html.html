<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LlamaBarrio - Tu comunidad conectada</title>
    <meta name="description" content="Descubre picadas y negocios locales en tu comuna con LlamaBarrio.">
    
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="/manifest.json">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css?v=5.0">

    <style>
      @media screen and (max-width: 800px) {
          .site-footer {
              background: #000 !important; /* Fondo negro puro */
              padding: 12px 0 !important;   /* Muy delgado */
              margin: 0 !important;
              border-top: 1px solid #333;
          }
          .footer-content p {
              font-size: 10px !important;    /* Texto muy pequeño */
              color: #fff !important;        /* Letras blancas */
              margin: 0 !important;
              letter-spacing: 0.5px;
          }
          .footer-content a {
              color: #fff !important;
              text-decoration: none;
              font-weight: 600;
          }
          /* Ocultamos el disclaimer legal largo en la app */
          .disclaimer-text {
              display: none !important;
          }
          /* Ajuste para que no choque con los botones flotantes */
          body {
              padding-bottom: 120px !important;
          }
      }
    </style>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <a href="#main-content" class="skip-link">Saltar al contenido principal</a>

    <nav class="navbar" aria-label="Navegación principal">
        <div class="nav-container">
            <div class="logo">
                <a href="/" aria-label="Ir al inicio de LlamaBarrio">
                    <img src="images/logo.png" alt="LlamaBarrio" class="logo-img">
                </a>
            </div>
            <div class="nav-right desktop-only">
                <a href="#" class="btn-recomienda">+ Recomienda</a>
                <button class="btn-negocio-blue">Soy Negocio</button>
            </div>
        </div>
    </nav>

    <header class="hero">
        <h1>Encuentra tu próxima <br><span class="highlight">picada favorita</span></h1>
        <div class="search-area">
                <div class="filter-group">
                    <div class="oval-input">
                        <span>📍</span>
                        <label for="comuna-select" class="sr-only">Selecciona tu comuna</label>
                        <select id="comuna-select" class="clean-select">
                            <option value="" disabled selected>Tu Comuna</option>
                            <option value="santiago">Santiago Centro</option>
                        </select>
                    </div>
                </div>
                <div class="filter-group">
                    <div class="search-box oval-input">
                        <span class="search-icon">🔍</span>
                        <label for="buscador-comida" class="sr-only">Buscar comida o negocio</label>
                        <input id="buscador-comida" type="text" placeholder="¿Qué quieres comer?" autocomplete="off">
                    </div>
                </div>
            </div>
    </header>

    <main id="main-content" class="content" tabindex="-1">
        <section style="height: 100px;" aria-label="Sección de contenido en construcción"></section>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <p><a href="#" aria-label="Leer términos y condiciones">Términos y Condiciones</a> — LlamaBarrio 2026</p>
            <p class="disclaimer-text">LlamaBarrio es una vitrina informativa. No realizamos ventas ni transacciones.</p>
        </div>
    </footer>

    <nav class="floating-nav mobile-only" aria-label="Acciones rápidas">
        <button type="button" class="btn-blue">+ Recomienda</button>
        <button type="button" class="btn-outline">🏠 Soy Negocio</button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
