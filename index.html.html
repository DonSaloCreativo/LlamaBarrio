<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LlamaBarrio - Tu comunidad conectada</title>
    
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="/manifest.json">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css?v=5.0">

    <style>
      @media screen and (max-width: 800px) {
          .site-footer {
              background: #000 !important; /* Fondo negro puro */
              padding: 12px 0 !important;   /* Muy delgado */
              margin: 0 !important;
              border-top: 1px solid #333;
          }
          .footer-content p {
              font-size: 10px !important;    /* Texto muy pequeño */
              color: #fff !important;        /* Letras blancas */
              margin: 0 !important;
              letter-spacing: 0.5px;
          }
          .footer-content a {
              color: #fff !important;
              text-decoration: none;
              font-weight: 600;
          }
          /* Ocultamos el disclaimer legal largo en la app */
          .disclaimer-text {
              display: none !important;
          }
          /* Ajuste para que no choque con los botones flotantes */
          body {
              padding-bottom: 120px !important;
          }
      }
    </style>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="images/logo.png" alt="LlamaBarrio" class="logo-img">
            </div>
            <div class="nav-right desktop-only">
                <a href="#" class="btn-recomienda">+ Recomienda</a>
                <button class="btn-negocio-blue">Soy Negocio</button>
            </div>
        </div>
    </nav>

    <header class="hero">
        <h1>Encuentra tu próxima <br><span class="highlight">picada favorita</span></h1>
        <div class="search-area">
            <div class="filter-group">
                <div class="oval-input">
                    <span>📍</span>
                    <select class="clean-select">
                        <option value="" disabled selected>Tu Comuna</option>
                        <option value="santiago">Santiago Centro</option>
                    </select>
                </div>
            </div>
            <div class="filter-group">
                <div class="search-box oval-input">
                    <span class="search-icon">🔍</span>
                    <input type="text" placeholder="¿Qué quieres comer?">
                </div>
            </div>
        </div>
    </header>

    <main class="content">
        <section style="height: 100px;"></section> </main>

    <footer class="site-footer">
        <div class="footer-content">
            <p><a href="#">Términos y Condiciones</a> — LlamaBarrio 2026</p>
            <p class="disclaimer-text">LlamaBarrio es una vitrina informativa. No realizamos ventas ni transacciones.</p>
        </div>
    </footer>

    <div class="floating-nav mobile-only">
        <button class="btn-blue">+ Recomienda</button>
        <button class="btn-outline">🏠 Soy Negocio</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
